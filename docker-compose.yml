services:
  backend:
    build: ./backend
    container_name: ai-plc-backend
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/ai_plc.db
    ports:
      - "18000:18000"
    restart: always

  frontend:
    build: ./frontend
    container_name: ai-plc-frontend
    ports:
      - "13000:3000"
    depends_on:
      - backend
    restart: always
